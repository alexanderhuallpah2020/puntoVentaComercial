<mat-sidenav-container class="shell-container">

  <mat-sidenav mode="side" opened class="sidebar">
    <div class="sidebar-header">
      <span class="logo-text">SCOP POS</span>
    </div>

    <mat-nav-list>
      <a mat-list-item routerLink="/pedidos" routerLinkActive="active-link">
        <mat-icon matListItemIcon>receipt_long</mat-icon>
        <span matListItemTitle>Pedidos</span>
      </a>
      <a mat-list-item class="disabled-link">
        <mat-icon matListItemIcon>point_of_sale</mat-icon>
        <span matListItemTitle>Ventas</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="main-content">
    <router-outlet />
  </mat-sidenav-content>

</mat-sidenav-container>
